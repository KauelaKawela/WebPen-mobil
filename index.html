<!DOCTYPE html>
<html lang="tr">
<head>
    <title>WebPen Mobil</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080c18">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --blue:#4fc3f7;--pink:#f48fb1;--green:#a5d6a7;
            --bg:#080c18;--panel:rgba(8,12,28,0.88);--border:rgba(79,195,247,0.15);
        }
        body{background:var(--bg);overflow:hidden;font-family:system-ui,-apple-system,sans-serif;touch-action:none}
        video{display:none}

        #cv-draw{position:absolute;inset:0;width:100%;height:100%;z-index:1;transform:scaleX(-1)}
        #cv-over{position:absolute;inset:0;width:100%;height:100%;z-index:2;transform:scaleX(-1)}

        #splash{
            position:fixed;inset:0;z-index:999;background:var(--bg);
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
            transition:opacity 0.4s
        }
        #splash.done{opacity:0;pointer-events:none}
        #splash-title{font-size:clamp(18px,5vw,26px);font-weight:700;color:var(--blue);letter-spacing:5px;text-transform:uppercase}
        #splash-sub{color:rgba(255,255,255,0.35);font-size:13px}
        .ring{width:44px;height:44px;border:3px solid rgba(79,195,247,0.1);border-top-color:var(--blue);border-radius:50%;animation:spin .85s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        #hud-top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:stretch;height:48px;background:var(--panel);border-bottom:1px solid var(--border)}
        .hc{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;padding:0 12px;border-right:1px solid rgba(255,255,255,0.04);min-width:0}
        .hc:last-child{border-right:none}
        .hc.grow{flex:1}
        .hl{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
        .hv{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);white-space:nowrap}
        .hv.on{color:var(--blue)}.hv.er{color:var(--pink)}
        .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background .2s,box-shadow .2s}
        .dot.draw{background:var(--blue);box-shadow:0 0 8px var(--blue)}
        .dot.erase{background:var(--pink);box-shadow:0 0 8px var(--pink)}

        #hud-bot{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--panel);border-top:1px solid var(--border);padding:8px 12px 10px;display:flex;flex-direction:column;gap:7px}
        #gcards{display:flex;gap:6px}
        .gc{flex:1;border-radius:9px;padding:7px 8px;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);transition:background .2s,border-color .2s}
        .gc.adraw{background:rgba(79,195,247,0.07);border-color:rgba(79,195,247,0.3)}
        .gc.aerase{background:rgba(244,143,177,0.07);border-color:rgba(244,143,177,0.3)}
        .gc.actrl{background:rgba(165,214,167,0.07);border-color:rgba(165,214,167,0.3)}
        .gi{font-size:18px;line-height:1}
        .ginfo{flex:1;min-width:0}
        .gt{font-size:9px;font-weight:700;letter-spacing:.3px;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .gd{font-size:8px;color:rgba(255,255,255,0.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .gs{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.08);flex-shrink:0;transition:background .2s,box-shadow .2s}
        .gc.adraw .gs{background:var(--blue);box-shadow:0 0 5px var(--blue)}
        .gc.aerase .gs{background:var(--pink);box-shadow:0 0 5px var(--pink)}
        .gc.actrl .gs{background:var(--green);box-shadow:0 0 5px var(--green)}

        #crow{display:flex;align-items:center;gap:5px}
        .sw{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
        .sw.picked{border-color:#fff;transform:scale(1.28);box-shadow:0 0 7px currentColor}
        #bbar{flex:1;display:flex;align-items:center;gap:6px}
        #blbl{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:1px;white-space:nowrap}
        #btrack{flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;position:relative}
        #bfill{position:absolute;left:0;top:0;bottom:0;background:var(--blue);border-radius:2px;transition:width .15s}

        #notif{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none}
        .nm{background:rgba(8,12,28,0.92);border:1px solid rgba(79,195,247,0.22);border-radius:7px;padding:5px 14px;color:var(--blue);font-size:11px;font-weight:600;white-space:nowrap;margin-bottom:4px;animation:nfIn .18s ease,nfOut .2s 1.4s forwards}
        @keyframes nfIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes nfOut{to{opacity:0;transform:translateY(-6px)}}

        #ship{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(8,12,28,0.9);border:1px solid var(--border);border-radius:12px;padding:12px 20px;display:flex;flex-direction:column;align-items:center;gap:4px}
        #ship.show{opacity:1}
        #sarr{font-size:28px;animation:pulse .55s ease infinite alternate}
        @keyframes pulse{from{opacity:.4}to{opacity:1}}
        #stxt{font-size:11px;color:var(--green);font-weight:700;letter-spacing:1px}
    </style>
</head>
<body>

<div id="splash">
    <div class="ring"></div>
    <div id="splash-title">WebPen Mobil</div>
    <div id="splash-sub">Kamera başlatılıyor…</div>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="cv-draw"></canvas>
<canvas id="cv-over"></canvas>

<div id="hud-top">
    <div class="hc" style="width:46px"><div class="dot" id="dot"></div><div class="hl">MOD</div></div>
    <div class="hc grow"><div class="hl">DURUM</div><div class="hv" id="stlbl">El bekleniyor…</div></div>
    <div class="hc"><div class="hl">EL</div><div class="hv" id="hcnt">0</div></div>
    <div class="hc"><div class="hl">FIRÇA</div><div class="hv" id="bval">5</div></div>
</div>

<div id="hud-bot">
    <div id="gcards">
        <div class="gc" id="gc-draw"><div class="gi">✊</div><div class="ginfo"><div class="gt">ÇİZ</div><div class="gd">Sağ el yumruk</div></div><div class="gs"></div></div>
        <div class="gc" id="gc-erase"><div class="gi">🖐</div><div class="ginfo"><div class="gt">SİLGİ</div><div class="gd">Yumruk + silgi mod</div></div><div class="gs"></div></div>
        <div class="gc" id="gc-ctrl"><div class="gi">👈</div><div class="ginfo"><div class="gt">KONTROL</div><div class="gd" id="cdesc">Sol el → kaydır</div></div><div class="gs"></div></div>
    </div>
    <div id="crow">
        <div class="sw picked" data-c="#4fc3f7" style="background:#4fc3f7"></div>
        <div class="sw" data-c="#f48fb1" style="background:#f48fb1"></div>
        <div class="sw" data-c="#a5d6a7" style="background:#a5d6a7"></div>
        <div class="sw" data-c="#fff176" style="background:#fff176"></div>
        <div class="sw" data-c="#ffffff" style="background:#ffffff"></div>
        <div class="sw" data-c="#ef9a9a" style="background:#ef9a9a"></div>
        <div class="sw" data-c="#ce93d8" style="background:#ce93d8"></div>
        <div class="sw" data-c="#80cbc4" style="background:#80cbc4"></div>
        <div class="sw" data-c="#ffcc80" style="background:#ffcc80"></div>
        <div id="bbar"><span id="blbl">FIRÇA</span><div id="btrack"><div id="bfill" style="width:20%"></div></div></div>
    </div>
</div>

<div id="notif"></div>
<div id="ship"><div id="sarr">←</div><div id="stxt">SİLGİ MODU</div></div>

<script>
var webcam  = document.getElementById('webcam');
var cvDraw  = document.getElementById('cv-draw');
var cvOver  = document.getElementById('cv-over');
var ctxD    = cvDraw.getContext('2d');
var ctxO    = cvOver.getContext('2d');
var splash  = document.getElementById('splash');
var dot     = document.getElementById('dot');
var stlbl   = document.getElementById('stlbl');
var hcnt    = document.getElementById('hcnt');
var bval    = document.getElementById('bval');
var bfill   = document.getElementById('bfill');
var notifEl = document.getElementById('notif');
var gcDraw  = document.getElementById('gc-draw');
var gcErase = document.getElementById('gc-erase');
var gcCtrl  = document.getElementById('gc-ctrl');
var cdesc   = document.getElementById('cdesc');
var ship    = document.getElementById('ship');
var sarr    = document.getElementById('sarr');
var stxt    = document.getElementById('stxt');

// STATE
var paths      = [];
var activePath = null;
var redoPool   = [];
var eraserOn   = false;
var inkColor   = '#4fc3f7';
var inkSize    = 5;
var launched   = false;
var curCx = null, curCy = null;
var leftXHist   = [];
var lastSwipeMs = 0;
var swipeTimer  = null;
var lastHudMs   = 0;
var cvW = 0, cvH = 0;
var drawDirty = false;
var ERASE_R = 38;

// Canvas resize (yalnızca gerekince)
function ensureSize() {
    var w = window.innerWidth, h = window.innerHeight;
    if (w === cvW && h === cvH) return;
    cvW = w; cvH = h;
    cvDraw.width = w; cvDraw.height = h;
    cvOver.width = w; cvOver.height = h;
    drawDirty = true;
}

// Notify
function notify(txt) {
    var el = document.createElement('div');
    el.className = 'nm'; el.textContent = txt;
    notifEl.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.remove(); }, 1800);
}

// Swipe hint
function swipeHint(toEraser) {
    sarr.textContent = toEraser ? '→' : '←';
    stxt.textContent = toEraser ? 'SİLGİ MODU' : 'KALEM MODU';
    ship.classList.add('show');
    if(swipeTimer) clearTimeout(swipeTimer);
    swipeTimer = setTimeout(function(){ ship.classList.remove('show'); }, 1100);
}

// Color swatches
var swatches = document.querySelectorAll('.sw');
function pickColor(c) {
    inkColor = c;
    swatches.forEach(function(s){ s.classList.toggle('picked', s.getAttribute('data-c') === c); });
}
swatches.forEach(function(s){
    s.addEventListener('pointerdown', function(e){ e.preventDefault(); pickColor(s.getAttribute('data-c')); });
});

// HUD — max 10fps DOM güncelle
function hudUpdate(detected, drawing, erasing) {
    var now = Date.now();
    if (now - lastHudMs < 100) return;
    lastHudMs = now;
    hcnt.textContent = detected;
    bval.textContent = inkSize;
    bfill.style.width = ((inkSize-1)/23*100) + '%';
    if (!detected) {
        dot.className='dot'; stlbl.textContent='El bekleniyor…'; stlbl.className='hv';
        gcDraw.className='gc'; gcErase.className='gc';
    } else if (drawing) {
        dot.className='dot draw'; stlbl.textContent='✏️ Çiziliyor'; stlbl.className='hv on';
        gcDraw.className='gc adraw'; gcErase.className='gc';
    } else if (erasing) {
        dot.className='dot erase'; stlbl.textContent='🧹 Siliniyor'; stlbl.className='hv er';
        gcDraw.className='gc'; gcErase.className='gc aerase';
    } else {
        dot.className='dot'; stlbl.textContent=eraserOn?'🧹 Silgi modu':'✋ Hazır'; stlbl.className='hv';
        gcDraw.className='gc'; gcErase.className='gc';
    }
}

// Yumruk tespiti — sade, hızlı
function isFist(m) {
    return (m[8].y > m[6].y) && (m[12].y > m[10].y) && (m[16].y > m[14].y) && (m[20].y > m[18].y);
}

// Tüm pathleri yeniden çiz (wipe sonrası)
function redrawAll() {
    ctxD.clearRect(0, 0, cvW, cvH);
    for (var i = 0; i < paths.length; i++) renderPath(paths[i]);
    drawDirty = false;
}

// Tek path çiz
function renderPath(p) {
    var n = p.nodes;
    if (!n || n.length < 2) return;
    ctxD.beginPath();
    ctxD.moveTo(n[0].px, n[0].py);
    if (n.length === 2) {
        ctxD.lineTo(n[1].px, n[1].py);
    } else {
        for (var k = 1; k < n.length-1; k++) {
            ctxD.quadraticCurveTo(n[k].px, n[k].py, (n[k].px+n[k+1].px)/2, (n[k].py+n[k+1].py)/2);
        }
        ctxD.lineTo(n[n.length-1].px, n[n.length-1].py);
    }
    ctxD.strokeStyle = p.hue;
    ctxD.lineWidth   = p.thick;
    ctxD.lineCap     = 'round';
    ctxD.lineJoin    = 'round';
    ctxD.shadowColor = p.hue;
    ctxD.shadowBlur  = 5;
    ctxD.globalAlpha = 1;
    ctxD.stroke();
    ctxD.shadowBlur  = 0;
}

// Sadece son segment çiz (incremental — çok hızlı)
function drawLastSeg(p) {
    var n = p.nodes, i = n.length-1;
    if (i < 1) return;
    ctxD.beginPath();
    if (i === 1) {
        ctxD.moveTo(n[0].px, n[0].py);
        ctxD.lineTo(n[1].px, n[1].py);
    } else {
        var mx0 = (n[i-2].px+n[i-1].px)/2, my0 = (n[i-2].py+n[i-1].py)/2;
        var mx1 = (n[i-1].px+n[i].px)/2,   my1 = (n[i-1].py+n[i].py)/2;
        ctxD.moveTo(mx0, my0);
        ctxD.quadraticCurveTo(n[i-1].px, n[i-1].py, mx1, my1);
    }
    ctxD.strokeStyle = p.hue;
    ctxD.lineWidth   = p.thick;
    ctxD.lineCap     = 'round';
    ctxD.lineJoin    = 'round';
    ctxD.shadowColor = p.hue;
    ctxD.shadowBlur  = 5;
    ctxD.stroke();
    ctxD.shadowBlur  = 0;
}

// Silgi
function wipeNear(px, py) {
    var prev = paths.length;
    paths = paths.filter(function(p) {
        if (!p.nodes) return true;
        for (var j = 0; j < p.nodes.length; j++) {
            if (Math.hypot(p.nodes[j].px-px, p.nodes[j].py-py) < ERASE_R) return false;
        }
        return true;
    });
    if (paths.length !== prev) drawDirty = true;
}

// ANA FRAME
function frame(out) {
    if (!launched) {
        launched = true;
        splash.classList.add('done');
        setTimeout(function(){ splash.style.display='none'; }, 500);
    }

    ensureSize();

    // Overlay: kamera + karartma
    ctxO.drawImage(out.image, 0, 0, cvW, cvH);
    ctxO.fillStyle = 'rgba(8,12,24,0.78)';
    ctxO.fillRect(0, 0, cvW, cvH);

    var detected=0, drawingNow=false, erasingNow=false;

    if (out.multiHandLandmarks && out.multiHandedness) {
        detected = out.multiHandLandmarks.length;
        var drawHand=null, ctrlHand=null;

        for (var hi=0; hi<detected; hi++) {
            var lbl = out.multiHandedness[hi].label;
            if (lbl==='Left')  drawHand = out.multiHandLandmarks[hi];
            if (lbl==='Right') ctrlHand = out.multiHandLandmarks[hi];
        }

        // KONTROL ELİ — swipe algıla
        if (ctrlHand) {
            leftXHist.push(ctrlHand[0].x);
            if (leftXHist.length > 10) leftXHist.shift();
            if (leftXHist.length >= 8) {
                var delta = leftXHist[leftXHist.length-1] - leftXHist[0];
                var now   = Date.now();
                if (Math.abs(delta) > 0.13 && now-lastSwipeMs > 750) {
                    if (delta < -0.13 && !eraserOn) {
                        eraserOn=true; lastSwipeMs=now; leftXHist=[];
                        notify('🧹 Silgi modu'); swipeHint(true);
                        gcCtrl.className='gc actrl'; cdesc.textContent='Sağa kaydırdı';
                        setTimeout(function(){ gcCtrl.className='gc'; cdesc.textContent='Sol el → kaydır'; }, 900);
                    } else if (delta > 0.13 && eraserOn) {
                        eraserOn=false; lastSwipeMs=now; leftXHist=[];
                        notify('✏️ Kalem modu'); swipeHint(false);
                        gcCtrl.className='gc actrl'; cdesc.textContent='Sola kaydırdı';
                        setTimeout(function(){ gcCtrl.className='gc'; cdesc.textContent='Sol el → kaydır'; }, 900);
                    }
                }
            }
            // Hafif iskelet
            drawConnectors(ctxO, ctrlHand, HAND_CONNECTIONS, {color:'rgba(165,214,167,0.15)',lineWidth:1});
        } else { leftXHist=[]; }

        // ÇİZİM ELİ
        if (drawHand) {
            var fist = isFist(drawHand);
            var rawX = (fist ? drawHand[9].x : drawHand[8].x) * cvW;
            var rawY = (fist ? drawHand[9].y : drawHand[8].y) * cvH;

            if (curCx===null) { curCx=rawX; curCy=rawY; }
            else { curCx+=(rawX-curCx)*0.4; curCy+=(rawY-curCy)*0.4; }

            drawConnectors(ctxO, drawHand, HAND_CONNECTIONS, {color:'rgba(79,195,247,0.15)',lineWidth:1});

            if (fist && !eraserOn) {
                ctxO.beginPath(); ctxO.arc(curCx,curCy,9,0,6.2832);
                ctxO.fillStyle=inkColor; ctxO.shadowColor=inkColor; ctxO.shadowBlur=12;
                ctxO.fill(); ctxO.shadowBlur=0;
                drawingNow=true;
            } else if (fist && eraserOn) {
                ctxO.beginPath(); ctxO.arc(curCx,curCy,ERASE_R,0,6.2832);
                ctxO.strokeStyle='rgba(244,143,177,0.6)'; ctxO.lineWidth=2; ctxO.stroke();
                erasingNow=true;
            } else {
                ctxO.beginPath(); ctxO.arc(curCx,curCy,5,0,6.2832);
                ctxO.strokeStyle='rgba(79,195,247,0.35)'; ctxO.lineWidth=1.5; ctxO.stroke();
            }

            if (fist) {
                if (eraserOn) {
                    wipeNear(curCx, curCy); activePath=null;
                } else {
                    if (!activePath) {
                        activePath={nodes:[{px:curCx,py:curCy}],hue:inkColor,thick:inkSize};
                        paths.push(activePath); redoPool=[];
                    } else {
                        activePath.nodes.push({px:curCx,py:curCy});
                        drawLastSeg(activePath); // incremental — sadece son segment
                    }
                }
            } else { activePath=null; }
        } else { curCx=null; curCy=null; activePath=null; }
    }

    if (drawDirty) redrawAll();
    hudUpdate(detected, drawingNow, erasingNow);
}

// Keyboard (desktop)
document.addEventListener('keydown', function(e){
    if(e.key==='+'||e.key==='='){inkSize=Math.min(24,inkSize+1);notify('Fırça: '+inkSize);}
    if(e.key==='-'){inkSize=Math.max(1,inkSize-1);notify('Fırça: '+inkSize);}
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();if(paths.length){redoPool.push(paths.pop());drawDirty=true;notify('↩ Geri');}}
    if(e.ctrlKey&&e.key==='y'){e.preventDefault();if(redoPool.length){paths.push(redoPool.pop());drawDirty=true;notify('↪ İleri');}}
    if(e.code==='Space'){e.preventDefault();paths=[];redoPool=[];drawDirty=true;notify('🗑 Temizlendi');}
});

// Pinch — fırça boyutu
var pinchD0=null, pinchS0=inkSize;
document.addEventListener('touchstart',function(e){if(e.touches.length===2){pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchS0=inkSize;}},{passive:true});
document.addEventListener('touchmove',function(e){if(e.touches.length===2&&pinchD0){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);inkSize=Math.max(1,Math.min(24,Math.round(pinchS0*d/pinchD0)));}},{passive:true});
document.addEventListener('touchend',function(e){if(e.touches.length<2)pinchD0=null;},{passive:true});

// MediaPipe
try {
    var tracker = new Hands({
        locateFile: function(f){ return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f; }
    });
    tracker.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,           // LITE model — mobilde %40+ daha hızlı
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.55
    });
    tracker.onResults(frame);

    var feed = new Camera(webcam, {
        onFrame: async function(){
            try { await tracker.send({image:webcam}); } catch(e){ console.warn(e); }
        },
        width: 480,    // 640→480: işlemci yükü önemli ölçüde azalır
        height: 360
    });

    feed.start().catch(function(){
        document.getElementById('splash-sub').textContent='Kamera hatası — izinleri kontrol edin.';
        setTimeout(function(){ splash.classList.add('done'); setTimeout(function(){ splash.style.display='none'; },500); },2500);
    });
} catch(e){ console.error(e); }
</script>
</body>
</html>
