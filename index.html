<!DOCTYPE html>
<html lang="tr">
<head>
    <title>WebPen Mobil</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080c18">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--blue:#4fc3f7;--pink:#f48fb1;--green:#a5d6a7;--bg:#080c18;--panel:rgba(8,12,28,0.9);--border:rgba(79,195,247,0.15)}
        body{background:var(--bg);overflow:hidden;font-family:system-ui,-apple-system,sans-serif;touch-action:none}
        video{display:none}
        canvas{position:absolute;inset:0;width:100%;height:100%}
        #cv-bg {z-index:1;transform:scaleX(-1)}
        #cv-ink{z-index:2}
        #cv-ui {z-index:3;transform:scaleX(-1)}

        #splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.4s}
        #splash.done{opacity:0;pointer-events:none}
        #splash-title{font-size:clamp(18px,5vw,26px);font-weight:700;color:var(--blue);letter-spacing:5px;text-transform:uppercase}
        #splash-sub{color:rgba(255,255,255,0.35);font-size:13px;text-align:center;padding:0 20px}
        .ring{width:44px;height:44px;border:3px solid rgba(79,195,247,0.1);border-top-color:var(--blue);border-radius:50%;animation:spin .85s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        #hud-top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:stretch;height:48px;background:var(--panel);border-bottom:1px solid var(--border)}
        .hc{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;padding:0 12px;border-right:1px solid rgba(255,255,255,0.04);min-width:0}
        .hc:last-child{border-right:none}.hc.grow{flex:1}
        .hl{font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
        .hv{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);white-space:nowrap}
        .hv.on{color:var(--blue)}.hv.er{color:var(--pink)}
        .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background .2s,box-shadow .2s}
        .dot.draw{background:var(--blue);box-shadow:0 0 8px var(--blue)}
        .dot.erase{background:var(--pink);box-shadow:0 0 8px var(--pink)}

        #hud-bot{position:fixed;bottom:0;left:0;right:0;z-index:10;background:var(--panel);border-top:1px solid var(--border);padding:8px 12px 10px;display:flex;flex-direction:column;gap:7px}
        #gcards{display:flex;gap:6px}
        .gc{flex:1;border-radius:9px;padding:7px 8px;display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);transition:background .2s,border-color .2s}
        .gc.adraw {background:rgba(79,195,247,0.1) ;border-color:rgba(79,195,247,0.4)}
        .gc.aerase{background:rgba(244,143,177,0.1);border-color:rgba(244,143,177,0.4)}
        .gc.actrl {background:rgba(165,214,167,0.1);border-color:rgba(165,214,167,0.4)}
        .gi{font-size:18px;line-height:1}
        .ginfo{flex:1;min-width:0}
        .gt{font-size:9px;font-weight:700;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .gd{font-size:8px;color:rgba(255,255,255,0.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .gs{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.08);flex-shrink:0;transition:background .2s,box-shadow .2s}
        .gc.adraw  .gs{background:var(--blue);box-shadow:0 0 5px var(--blue)}
        .gc.aerase .gs{background:var(--pink);box-shadow:0 0 5px var(--pink)}
        .gc.actrl  .gs{background:var(--green);box-shadow:0 0 5px var(--green)}

        #crow{display:flex;align-items:center;gap:5px}
        .sw{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
        .sw.picked{border-color:#fff;transform:scale(1.28);box-shadow:0 0 7px currentColor}
        #bbar{flex:1;display:flex;align-items:center;gap:6px}
        #blbl{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:1px;white-space:nowrap}
        #btrack{flex:1;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;position:relative}
        #bfill{position:absolute;left:0;top:0;bottom:0;background:var(--blue);border-radius:2px;transition:width .15s}

        #notif{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none}
        .nm{background:rgba(8,12,28,0.95);border:1px solid rgba(79,195,247,0.3);border-radius:7px;padding:6px 16px;color:var(--blue);font-size:12px;font-weight:600;white-space:nowrap;margin-bottom:4px;animation:nfIn .18s ease,nfOut .2s 1.6s forwards}
        @keyframes nfIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes nfOut{to{opacity:0;transform:translateY(-6px)}}

        #dbg{position:fixed;bottom:110px;left:8px;z-index:10;background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.5);font-size:9px;padding:3px 8px;border-radius:5px;pointer-events:none;line-height:1.8;font-family:monospace;white-space:pre}
    </style>
</head>
<body>

<div id="splash">
    <div class="ring"></div>
    <div id="splash-title">WebPen Mobil</div>
    <div id="splash-sub">Kamera ba\u015flat\u0131l\u0131yor\u2026</div>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="cv-bg"></canvas>
<canvas id="cv-ink"></canvas>
<canvas id="cv-ui"></canvas>

<div id="hud-top">
    <div class="hc" style="width:46px"><div class="dot" id="dot"></div><div class="hl">MOD</div></div>
    <div class="hc grow"><div class="hl">DURUM</div><div class="hv" id="stlbl">El bekleniyor\u2026</div></div>
    <div class="hc"><div class="hl">EL</div><div class="hv" id="hcnt">0</div></div>
    <div class="hc"><div class="hl">FIR\u00c7A</div><div class="hv" id="bval">5</div></div>
</div>

<div id="hud-bot">
    <div id="gcards">
        <div class="gc" id="gc-draw">
            <div class="gi">\u270a</div>
            <div class="ginfo"><div class="gt">\u00c7\u0130Z</div><div class="gd">Sa\u011f el yumruk</div></div>
            <div class="gs"></div>
        </div>
        <div class="gc" id="gc-erase">
            <div class="gi">\u270a</div>
            <div class="ginfo"><div class="gt">S\u0130LG\u0130</div><div class="gd">Sol el yumruk</div></div>
            <div class="gs"></div>
        </div>
        <div class="gc" id="gc-ctrl">
            <div class="gi">\ud83d\udd90</div>
            <div class="ginfo"><div class="gt">KALEM</div><div class="gd">Sol el a\u00e7\u0131k</div></div>
            <div class="gs"></div>
        </div>
    </div>
    <div id="crow">
        <div class="sw picked" data-c="#4fc3f7" style="background:#4fc3f7"></div>
        <div class="sw" data-c="#f48fb1" style="background:#f48fb1"></div>
        <div class="sw" data-c="#a5d6a7" style="background:#a5d6a7"></div>
        <div class="sw" data-c="#fff176" style="background:#fff176"></div>
        <div class="sw" data-c="#ffffff" style="background:#ffffff"></div>
        <div class="sw" data-c="#ef9a9a" style="background:#ef9a9a"></div>
        <div class="sw" data-c="#ce93d8" style="background:#ce93d8"></div>
        <div class="sw" data-c="#80cbc4" style="background:#80cbc4"></div>
        <div class="sw" data-c="#ffcc80" style="background:#ffcc80"></div>
        <div id="bbar">
            <span id="blbl">FIR\u00c7A</span>
            <div id="btrack"><div id="bfill" style="width:20%"></div></div>
        </div>
    </div>
</div>

<div id="notif"></div>
<div id="dbg">\u2014</div>

<script>
// \u2500\u2500 DOM \u2500\u2500
var webcam  = document.getElementById('webcam');
var cvBg    = document.getElementById('cv-bg');
var cvInk   = document.getElementById('cv-ink');
var cvUi    = document.getElementById('cv-ui');
var cBg     = cvBg.getContext('2d');
var cInk    = cvInk.getContext('2d');
var cUi     = cvUi.getContext('2d');
var splash  = document.getElementById('splash');
var dot     = document.getElementById('dot');
var stlbl   = document.getElementById('stlbl');
var hcnt    = document.getElementById('hcnt');
var bval    = document.getElementById('bval');
var bfill   = document.getElementById('bfill');
var notifEl = document.getElementById('notif');
var gcDraw  = document.getElementById('gc-draw');
var gcErase = document.getElementById('gc-erase');
var gcCtrl  = document.getElementById('gc-ctrl');
var dbgEl   = document.getElementById('dbg');

// \u2500\u2500 STATE \u2500\u2500
var paths      = [];
var activePath = null;
var redoPool   = [];
var eraserOn   = false;
var inkColor   = '#4fc3f7';
var inkSize    = 5;
var launched   = false;
var curX = null, curY = null;
var lastHudMs  = 0;
var W = 0, H = 0;
var inkDirty   = false;
var ERASE_R    = 44;
var lastModeChange = 0;

// \u2500\u2500 YEN\u0130: frame throttle & busy flag \u2500\u2500
var busy       = false;      // MediaPipe hen\u00fcz bitirmedi \u2192 yeni frame g\u00f6nderme
var lastFrameMs = 0;
var FRAME_INTERVAL = 80;     // ~12 fps yeterli, mobil \u0131s\u0131nmaz (de\u011fi\u015ftirilebilir: 66=15fps, 100=10fps)

// \u2500\u2500 BOYUT \u2500\u2500
function ensureSize() {
    var w = window.innerWidth, h = window.innerHeight;
    if (w === W && h === H) return;
    W = w; H = h;
    cvBg.width=w;  cvBg.height=h;
    cvInk.width=w; cvInk.height=h;
    cvUi.width=w;  cvUi.height=h;
    inkDirty = true;
}

// \u2500\u2500 NOTIFY \u2500\u2500
function notify(txt) {
    var el = document.createElement('div');
    el.className = 'nm'; el.textContent = txt;
    notifEl.appendChild(el);
    setTimeout(function(){ if(el.parentNode) el.remove(); }, 2000);
}

// \u2500\u2500 RENK \u2500\u2500
var swatches = document.querySelectorAll('.sw');
function pickColor(c) {
    inkColor = c;
    swatches.forEach(function(s){ s.classList.toggle('picked', s.getAttribute('data-c') === c); });
}
swatches.forEach(function(s){
    s.addEventListener('pointerdown', function(e){ e.preventDefault(); pickColor(s.getAttribute('data-c')); });
});

// \u2500\u2500 HUD \u2500\u2500
function hudUpdate(detected, drawing, erasing) {
    var now = Date.now();
    if (now - lastHudMs < 100) return;
    lastHudMs = now;
    hcnt.textContent = detected;
    bval.textContent = inkSize;
    bfill.style.width = ((inkSize-1)/23*100) + '%';
    gcDraw.className  = 'gc';
    gcErase.className = 'gc';
    gcCtrl.className  = 'gc';
    if (!detected) {
        dot.className = 'dot';
        stlbl.textContent = 'El bekleniyor\u2026';
        stlbl.className = 'hv';
    } else if (drawing) {
        dot.className = 'dot draw';
        stlbl.textContent = '\u270f\ufe0f \u00c7iziliyor';
        stlbl.className = 'hv on';
        gcDraw.className = 'gc adraw';
    } else if (erasing) {
        dot.className = 'dot erase';
        stlbl.textContent = '\ud83e\uddf9 Siliniyor';
        stlbl.className = 'hv er';
        gcErase.className = 'gc aerase';
    } else if (eraserOn) {
        dot.className = 'dot erase';
        stlbl.textContent = '\ud83e\uddf9 Silgi modu';
        stlbl.className = 'hv er';
        gcErase.className = 'gc aerase';
    } else {
        dot.className = 'dot';
        stlbl.textContent = '\u270b Haz\u0131r';
        stlbl.className = 'hv';
        gcCtrl.className = 'gc actrl';
    }
}

// \u2500\u2500 YUMRUK \u2500\u2500
function isFist(m) {
    var c = 0;
    if (m[8].y  > m[6].y)  c++;
    if (m[12].y > m[10].y) c++;
    if (m[16].y > m[14].y) c++;
    if (m[20].y > m[18].y) c++;
    return c >= 3;
}

// \u2500\u2500 T\u00dcM \u00c7\u0130Z\u0130MLER\u0130 YEN\u0130DEN \u00c7\u0130Z \u2500\u2500
function redrawAll() {
    cInk.clearRect(0, 0, W, H);
    for (var i = 0; i < paths.length; i++) drawFullPath(paths[i]);
    inkDirty = false;
}

function drawFullPath(p) {
    var n = p.nodes;
    if (!n || n.length < 2) return;
    cInk.save();
    cInk.strokeStyle = p.hue;
    cInk.lineWidth   = p.thick;
    cInk.lineCap     = 'round';
    cInk.lineJoin    = 'round';
    cInk.shadowColor = p.hue;
    cInk.shadowBlur  = 4;
    cInk.beginPath();
    cInk.moveTo(n[0].px, n[0].py);
    if (n.length === 2) {
        cInk.lineTo(n[1].px, n[1].py);
    } else {
        for (var k = 1; k < n.length-1; k++) {
            cInk.quadraticCurveTo(n[k].px, n[k].py, (n[k].px+n[k+1].px)/2, (n[k].py+n[k+1].py)/2);
        }
        cInk.lineTo(n[n.length-1].px, n[n.length-1].py);
    }
    cInk.stroke();
    cInk.restore();
}

// \u2500\u2500 SON SEGMENT \u2500\u2500
function drawLastSeg(p) {
    var n = p.nodes, i = n.length-1;
    if (i < 1) return;
    cInk.save();
    cInk.strokeStyle = p.hue;
    cInk.lineWidth   = p.thick;
    cInk.lineCap     = 'round';
    cInk.lineJoin    = 'round';
    cInk.shadowColor = p.hue;
    cInk.shadowBlur  = 4;
    cInk.beginPath();
    if (i === 1) {
        cInk.moveTo(n[0].px, n[0].py);
        cInk.lineTo(n[1].px, n[1].py);
    } else {
        var mx0 = (n[i-2].px+n[i-1].px)/2, my0 = (n[i-2].py+n[i-1].py)/2;
        var mx1 = (n[i-1].px+n[i].px)/2,   my1 = (n[i-1].py+n[i].py)/2;
        cInk.moveTo(mx0, my0);
        cInk.quadraticCurveTo(n[i-1].px, n[i-1].py, mx1, my1);
    }
    cInk.stroke();
    cInk.restore();
}

// \u2500\u2500 S\u0130LG\u0130 \u2500\u2500
function wipeNear(px, py) {
    var prev = paths.length;
    paths = paths.filter(function(p) {
        if (!p.nodes) return true;
        for (var j = 0; j < p.nodes.length; j++) {
            if (Math.hypot(p.nodes[j].px - px, p.nodes[j].py - py) < ERASE_R) return false;
        }
        return true;
    });
    if (paths.length !== prev) inkDirty = true;
}

// \u2500\u2500 ANA FRAME \u2500\u2500
function frame(out) {
    busy = false; // MediaPipe bitti, sonraki frame g\u00f6nderilebilir

    if (!launched) {
        launched = true;
        splash.classList.add('done');
        setTimeout(function(){ splash.style.display='none'; }, 500);
    }

    ensureSize();

    cBg.drawImage(out.image, 0, 0, W, H);
    cBg.fillStyle = 'rgba(8,12,24,0.76)';
    cBg.fillRect(0, 0, W, H);

    cUi.clearRect(0, 0, W, H);

    var detected   = 0;
    var drawingNow = false;
    var erasingNow = false;
    var dbg        = '';

    if (out.multiHandLandmarks && out.multiHandedness) {
        detected = out.multiHandLandmarks.length;

        var drawHand = null;
        var ctrlHand = null;

        if (detected === 1) {
            drawHand = out.multiHandLandmarks[0];
        } else {
            var h0 = out.multiHandLandmarks[0];
            var h1 = out.multiHandLandmarks[1];
            if (h0[0].x >= h1[0].x) {
                drawHand = h0; ctrlHand = h1;
            } else {
                drawHand = h1; ctrlHand = h0;
            }
        }

        if (ctrlHand) {
            var ctrlFist = isFist(ctrlHand);
            var now = Date.now();
            if (now - lastModeChange > 400) {
                if (ctrlFist && !eraserOn) {
                    eraserOn = true;
                    lastModeChange = now;
                    activePath = null;
                    notify('\ud83e\uddf9 Silgi modu');
                } else if (!ctrlFist && eraserOn) {
                    eraserOn = false;
                    lastModeChange = now;
                    notify('\u270f\ufe0f Kalem modu');
                }
            }
            drawConnectors(cUi, ctrlHand, HAND_CONNECTIONS, {color: ctrlFist ? 'rgba(244,143,177,0.35)' : 'rgba(165,214,167,0.25)', lineWidth: 1.5});
            drawLandmarks(cUi, ctrlHand, {color: ctrlFist ? 'rgba(244,143,177,0.6)' : 'rgba(165,214,167,0.5)', lineWidth: 1, radius: 2});
            dbg += 'SOL
